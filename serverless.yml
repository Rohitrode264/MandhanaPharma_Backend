service: mandanapharma-backend
useDotenv: true

provider:
  name: aws
  runtime: nodejs20.x
  stage: dev
  region: ap-south-1
  memorySize: 512
  timeout: 29 # API Gateway limit is 29 seconds
  apiGateway:
    binaryMediaTypes:
      - '*/*'
  environment:
    PORT: 5000
    NODE_ENV: ${self:provider.stage}
    MONGO_URI: ${env:MONGO_URI}
    JWT_SECRET: ${env:JWT_SECRET}
    JWT_EXPIRES_IN: ${env:JWT_EXPIRES_IN}
    SMTP_HOST: ${env:SMTP_HOST}
    SMTP_PORT: ${env:SMTP_PORT}
    SMTP_USER: ${env:SMTP_USER}
    SMTP_PASS: ${env:SMTP_PASS}
    FROM_EMAIL: ${env:FROM_EMAIL}
    FRONTEND_URL: ${env:FRONTEND_URL}
    AWS_S3_BUCKET_NAME: ${env:AWS_S3_BUCKET_NAME}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
            - s3:DeleteObject
          Resource:
            - arn:aws:s3:::${env:AWS_S3_BUCKET_NAME}/*

functions:
  api:
    handler: dist/lambda.handler
    events:
      - http:
          path: /
          method: any
          cors: true
      - http:
          path: /{proxy+}
          method: any
          cors: true

package:
  individually: true
  excludeDevDependencies: true
  patterns:
    - '!src/**'
    - '!tsconfig.json'
    - '!README.md'
    - 'dist/**'
    - 'node_modules/**'
